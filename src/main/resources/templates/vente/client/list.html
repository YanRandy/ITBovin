<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Liste des clients</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-4">
    <h1 class="mb-4">Clients</h1>

    <!-- Formulaire de filtrage + choix de la taille de page -->
    <form method="get" th:action="@{/clients}" class="row g-3 mb-4 align-items-end">
        <div class="col-md-3">
            <label for="nom" class="form-label">Nom</label>
            <input type="text" class="form-control" id="nom" name="nom" th:value="${nom}">
        </div>
        <div class="col-md-3">
            <label for="adresse" class="form-label">Adresse</label>
            <input type="text" class="form-control" id="adresse" name="adresse" th:value="${adresse}">
        </div>
        <div class="col-md-3">
            <label for="contact" class="form-label">Contact</label>
            <input type="text" class="form-control" id="contact" name="contact" th:value="${contact}">
        </div>
        <div class="col-md-3">
            <label for="sizeSelect" class="form-label">Taille de page</label>
                <select id="sizeSelect" name="size" class="form-select">
                    <option value="5" th:selected="${size == 5}">5</option>
                    <option value="10" th:selected="${size == 10}">10</option>
                    <option value="25" th:selected="${size == 25}">25</option>
                    <option value="50" th:selected="${size == 50}">50</option>
                </select>
        </div>
        <div class="col-md-12 d-flex gap-2">
            <button type="submit" class="btn btn-primary">Filtrer / Appliquer</button>
            <a href="/clients" class="btn btn-secondary">Réinitialiser</a>
        </div>
        <!-- Champs cachés pour la pagination et le tri -->
        <input type="hidden" name="page" value="0">
        <input type="hidden" name="sortBy" th:value="${sortBy}">
        <input type="hidden" name="sortDir" th:value="${sortDir}">
    </form>

    <!-- Tableau des clients -->
<table class="table table-striped table-hover">
    <thead class="table-dark">
        <tr>
            <th>
                <a th:href="@{/clients(nom=${nom}, adresse=${adresse}, contact=${contact}, page=${clientPage.number}, size=${size}, sortBy='id', sortDir=${sortBy == 'id' && sortDir == 'asc' ? 'desc' : 'asc'})}" class="text-white text-decoration-none">
                    ID <span th:text="${sortBy == 'id'} ? (${sortDir == 'asc'} ? '↑' : '↓') : ''"></span>
                </a>
            </th>
            <th>
                <a th:href="@{/clients(nom=${nom}, adresse=${adresse}, contact=${contact}, page=${clientPage.number}, size=${size}, sortBy='nom', sortDir=${sortBy == 'nom' && sortDir == 'asc' ? 'desc' : 'asc'})}" class="text-white text-decoration-none">
                    Nom <span th:text="${sortBy == 'nom'} ? (${sortDir == 'asc'} ? '↑' : '↓') : ''"></span>
                </a>
            </th>
            <th>
                <a th:href="@{/clients(nom=${nom}, adresse=${adresse}, contact=${contact}, page=${clientPage.number}, size=${size}, sortBy='adresse', sortDir=${sortBy == 'adresse' && sortDir == 'asc' ? 'desc' : 'asc'})}" class="text-white text-decoration-none">
                    Adresse <span th:text="${sortBy == 'adresse'} ? (${sortDir == 'asc'} ? '↑' : '↓') : ''"></span>
                </a>
            </th>
            <th>
                <a th:href="@{/clients(nom=${nom}, adresse=${adresse}, contact=${contact}, page=${clientPage.number}, size=${size}, sortBy='contact', sortDir=${sortBy == 'contact' && sortDir == 'asc' ? 'desc' : 'asc'})}" class="text-white text-decoration-none">
                    Contact <span th:text="${sortBy == 'contact'} ? (${sortDir == 'asc'} ? '↑' : '↓') : ''"></span>
                </a>
            </th>
        </tr>
    </thead>
    <tbody>
        <tr th:each="client : ${clientPage.content}">
            <td th:text="${client.id}">1</td>
            <td th:text="${client.nom}">Nom Client</td>
            <td th:text="${client.adresse}">Adresse</td>
            <td th:text="${client.contact}">Contact</td>
            <td>
                <a th:href="@{/vente/nouvelle(idClient=${client.id})}" class="btn btn-sm btn-success">
                    Créer une vente
                </a>
            </td>
        </tr>
        <tr th:if="${clientPage.totalElements == 0}">
            <td colspan="4" class="text-center text-muted">Aucun client trouvé pour ces critères.</td>
        </tr>
    </tbody>
</table>

    <!-- Pagination -->
    <nav aria-label="Page navigation">
        <ul class="pagination">
            <!-- Previous -->
            <li class="page-item" th:classappend="${clientPage.first} ? 'disabled' : ''">
                <a class="page-link" th:href="@{/clients(nom=${nom}, adresse=${adresse}, contact=${contact}, page=${clientPage.number - 1}, size=${size}, sortBy=${sortBy}, sortDir=${sortDir})}">
                    Précédent
                </a>
            </li>

            <!-- Numéros de pages -->
            <li th:each="i : ${#numbers.sequence(0, clientPage.totalPages - 1)}"
                class="page-item" th:classappend="${i == clientPage.number} ? 'active' : ''">
                <a class="page-link" th:href="@{/clients(nom=${nom}, adresse=${adresse}, contact=${contact}, page=${i}, size=${size}, sortBy=${sortBy}, sortDir=${sortDir})}"
                   th:text="${i + 1}"></a>
            </li>

            <!-- Next -->
            <li class="page-item" th:classappend="${clientPage.last} ? 'disabled' : ''">
                <a class="page-link" th:href="@{/clients(nom=${nom}, adresse=${adresse}, contact=${contact}, page=${clientPage.number + 1}, size=${size}, sortBy=${sortBy}, sortDir=${sortDir})}">
                    Suivant
                </a>
            </li>
        </ul>
    </nav>

    <div class="mt-2">
        <span>Page <span th:text="${clientPage.number + 1}"></span> sur <span th:text="${clientPage.totalPages}"></span> - 
        <span th:text="${clientPage.totalElements}"></span> clients au total</span>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.getElementById('sizeSelect').addEventListener('change', function() {
        // Soumettre le formulaire automatiquement lorsque la taille change
        this.form.submit();
    });
</script>
</body>
</html>
