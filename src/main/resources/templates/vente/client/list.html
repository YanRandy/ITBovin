<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Liste des clients</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-4">
    <h1 class="mb-4">Clients</h1>

    <!-- Formulaire de filtrage + choix de la taille de page -->
    <form method="get" action="/clients" class="row g-3 mb-4 align-items-end">
        <div class="col-md-3">
            <label for="nom" class="form-label">Nom</label>
            <input type="text" class="form-control" id="nom" name="nom" th:value="${nom}">
        </div>
        <div class="col-md-3">
            <label for="adresse" class="form-label">Adresse</label>
            <input type="text" class="form-control" id="adresse" name="adresse" th:value="${adresse}">
        </div>
        <div class="col-md-3">
            <label for="contact" class="form-label">Contact</label>
            <input type="text" class="form-control" id="contact" name="contact" th:value="${contact}">
        </div>
        <div class="col-md-3">
            <label for="sizeSelect" class="form-label">Taille de page</label>
            <select class="form-select" id="sizeSelect" name="size">
                <option value="5" th:selected="${size == 5}">5</option>
                <option value="10" th:selected="${size == 10}">10</option>
                <option value="20" th:selected="${size == 20}">20</option>
                <option value="50" th:selected="${size == 50}">50</option>
            </select>
        </div>
        <div class="col-md-12 d-flex gap-2">
            <button type="submit" class="btn btn-primary">Filtrer / Appliquer</button>
            <a href="/clients" class="btn btn-secondary">Réinitialiser</a>
        </div>
        <!-- Champs cachés pour la pagination et le tri -->
        <input type="hidden" name="page" value="0">
        <input type="hidden" name="sortBy" th:value="${sortBy}">
        <input type="hidden" name="sortDir" th:value="${sortDir}">
    </form>

    <!-- Tableau des clients -->
    <table class="table table-striped table-bordered">
        <thead>
            <tr>
                <th>
                    <a th:href="@{/clients(nom=${nom}, adresse=${adresse}, contact=${contact}, page=${page}, size=${size}, sortBy='id', sortDir=${sortDir == 'asc' ? 'desc' : 'asc'})}">
                        ID <span th:if="${sortBy == 'id'}" th:text="${sortDir == 'asc' ? '▲' : '▼'}"></span>
                    </a>
                </th>
                <th>
                    <a th:href="@{/clients(nom=${nom}, adresse=${adresse}, contact=${contact}, page=${page}, size=${size}, sortBy='nom', sortDir=${sortDir == 'asc' ? 'desc' : 'asc'})}">
                        Nom <span th:if="${sortBy == 'nom'}" th:text="${sortDir == 'asc' ? '▲' : '▼'}"></span>
                    </a>
                </th>
                <th>
                    <a th:href="@{/clients(nom=${nom}, adresse=${adresse}, contact=${contact}, page=${page}, size=${size}, sortBy='adresse', sortDir=${sortDir == 'asc' ? 'desc' : 'asc'})}">
                        Adresse <span th:if="${sortBy == 'adresse'}" th:text="${sortDir == 'asc' ? '▲' : '▼'}"></span>
                    </a>
                </th>
                <th>
                    <a th:href="@{/clients(nom=${nom}, adresse=${adresse}, contact=${contact}, page=${page}, size=${size}, sortBy='contact', sortDir=${sortDir == 'asc' ? 'desc' : 'asc'})}">
                        Contact <span th:if="${sortBy == 'contact'}" th:text="${sortDir == 'asc' ? '▲' : '▼'}"></span>
                    </a>
                </th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="client : ${clientPage.content}">
                <td th:text="${client.id}"></td>
                <td th:text="${client.nom}"></td>
                <td th:text="${client.adresse}"></td>
                <td th:text="${client.contact}"></td>
                <td>
                    <a th:href="@{/ventes/new(clientId=${client.id})}" class="btn btn-success btn-sm">
                        Vendre bovin
                    </a>
                </td>
            </tr>
            <tr th:if="${clientPage.empty}">
                <td colspan="5" class="text-center">Aucun client trouvé</td>
            </tr>
        </tbody>
    </table>

    <!-- Pagination -->
    <nav aria-label="Page navigation">
        <ul class="pagination">
            <!-- Previous -->
            <li class="page-item" th:classappend="${clientPage.first} ? 'disabled' : ''">
                <a class="page-link" th:href="@{/clients(nom=${nom}, adresse=${adresse}, contact=${contact}, page=${clientPage.number - 1}, size=${size}, sortBy=${sortBy}, sortDir=${sortDir})}">
                    Précédent
                </a>
            </li>

            <!-- Numéros de pages -->
            <li th:each="i : ${#numbers.sequence(0, clientPage.totalPages - 1)}"
                class="page-item" th:classappend="${i == clientPage.number} ? 'active' : ''">
                <a class="page-link" th:href="@{/clients(nom=${nom}, adresse=${adresse}, contact=${contact}, page=${i}, size=${size}, sortBy=${sortBy}, sortDir=${sortDir})}"
                   th:text="${i + 1}"></a>
            </li>

            <!-- Next -->
            <li class="page-item" th:classappend="${clientPage.last} ? 'disabled' : ''">
                <a class="page-link" th:href="@{/clients(nom=${nom}, adresse=${adresse}, contact=${contact}, page=${clientPage.number + 1}, size=${size}, sortBy=${sortBy}, sortDir=${sortDir})}">
                    Suivant
                </a>
            </li>
        </ul>
    </nav>

    <div class="mt-2">
        <span>Page <span th:text="${clientPage.number + 1}"></span> sur <span th:text="${clientPage.totalPages}"></span> - 
        <span th:text="${clientPage.totalElements}"></span> clients au total</span>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
