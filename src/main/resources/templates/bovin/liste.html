<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liste des Bovins</title>
</head>
<body>
    <h1>HELLOOOOOOO</h1>
    <h2>Liste des bovins :</h2>

    <div th:if="${not #lists.isEmpty(bovins)}">
        <table border="1">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Race</th>
                    <th>Lot</th>
                    <th>Poids Initial</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="bovin : ${bovins}">
                    <td th:text="${bovin.id}"></td>
                    <td th:text="${bovin.race?.libelle ?: 'Race non définie'}"></td>  <!-- Correction ici -->
                    <td th:text="${bovin.lot?.id ?: 'Lot non défini'}"></td>
                    <td th:text="${bovin.poidsInitial}"></td>
                </tr>
            </tbody>
        </table>
    </div>

    <div th:if="${#lists.isEmpty(bovins)}">
        <p>Aucun bovin trouvé.</p>
    </div>
</body>
</html>
