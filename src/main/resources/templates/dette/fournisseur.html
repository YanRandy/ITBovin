<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dettes Fournisseurs</title>
</head>
<body>
    <h1> Dettes Fournisseurs</h1>
    <a href="/"> Retour à l'accueil</a>
    
    <hr>
    
    <div th:if="${not #lists.isEmpty(dettes)}">
        <p>Nombre de dettes : <span th:text="${#lists.size(dettes)}"></span></p>
        
        <table border="1" style="border-collapse: collapse; width: 100%;">
            <thead style="background: #1a1a2e; color: white;">
                <tr>
                    <th style="padding: 10px;">ID Achat</th>
                    <th style="padding: 10px;">Fournisseur</th>
                    <th style="padding: 10px;">Description</th>
                    <th style="padding: 10px;">Total Crédit</th>
                    <th style="padding: 10px;">Total Débit</th>
                    <th style="padding: 10px;">Reste à Payer</th>
                    <th style="padding: 10px;">Montant à Rembourser</th>
                    <th style="padding: 10px;">Action</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="dette : ${dettes}" style="border-bottom: 1px solid #ddd;">
                    <td style="padding: 10px;" th:text="${dette.idAchat}"></td>
                    <td style="padding: 10px;" th:text="${dette.fournisseurNom}"></td>
                    <td style="padding: 10px;" th:text="${dette.achatDescription}"></td>
                    <td style="padding: 10px; text-align: right;" th:text="${#numbers.formatDecimal(dette.totalCreditFournisseur, 0, 2)}"></td>
                    <td style="padding: 10px; text-align: right;" th:text="${#numbers.formatDecimal(dette.totalDebitFournisseur, 0, 2)}"></td>
                    <td style="padding: 10px; text-align: right; font-weight: bold; color: #e94560;" th:text="${#numbers.formatDecimal(dette.resteAPayer, 0, 2)}"></td>
                    <td style="padding: 10px;">
                        <input type="number" class="montant-remboursement" 
                               th:max="${dette.resteAPayer}" 
                               step="100" 
                               placeholder="Montant"
                               style="width: 120px; padding: 5px;">
                    </td>
                    <td style="padding: 10px;">
                        <!-- Correction : utiliser th:attr pour s'assurer que les données sont bien passées -->
                        <button onclick="rembourser(this)" 
                                th:attr="data-id-achat=${dette.idAchat}, data-reste=${dette.resteAPayer}"
                                style="padding: 5px 15px; background: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer;">
                            💳 Rembourser
                        </button>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
    
    <div th:if="${#lists.isEmpty(dettes)}">
        <p>📭 Aucune dette fournisseur trouvée.</p>
    </div>
    
    <script>
        function rembourser(button) {
            console.log("=== CLIC SUR REMBOURSER ===");
            
            // Récupérer les données du bouton
            const idAchat = button.getAttribute('data-id-achat');
            const reste = parseFloat(button.getAttribute('data-reste'));
            
            console.log("ID Achat récupéré:", idAchat);
            console.log("Type de idAchat:", typeof idAchat);
            console.log("Reste à payer:", reste);
            
            // Vérifier que l'ID Achat est présent
            if (!idAchat || idAchat === 'null' || idAchat === 'undefined') {
                alert(' Erreur: ID Achat manquant dans le bouton !');
                return;
            }
            
            const row = button.closest('tr');
            const input = row.querySelector('.montant-remboursement');
            const montant = parseFloat(input.value);
            
            console.log("Montant saisi:", input.value);
            console.log("Montant parsé:", montant);
            
            // Validation du montant
            if (!input.value || input.value.trim() === '') {
                alert(' Veuillez entrer un montant.');
                return;
            }
            
            if (isNaN(montant) || montant <= 0) {
                alert(' Veuillez entrer un montant valide (nombre positif).');
                return;
            }
            
            if (montant > reste) {
                alert(' Le montant ne peut pas dépasser le reste à payer (' + reste.toFixed(2) + ' Ar).');
                return;
            }
            
            // Confirmation
            if (!confirm('Confirmez-vous le remboursement de ' + montant.toFixed(2) + ' Ar pour l\'achat #' + idAchat + ' ?')) {
                return;
            }
            
            // Désactiver le bouton
            button.disabled = true;
            button.textContent = '⏳ Traitement...';
            
            // Préparer les données
            const data = {
                idAchat: parseInt(idAchat),
                montant: montant
            };
            
            console.log("Données envoyées au serveur:", data);
            console.log("JSON envoyé:", JSON.stringify(data));
            
            // Appel API
            fetch('/api/dette/rembourser', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(data)
            })
            .then(response => {
                console.log("Statut de la réponse:", response.status);
                return response.json();
            })
            .then(data => {
                console.log("Réponse reçue du serveur:", data);
                
                if (data.success) {
                    alert(' ' + data.message);
                    setTimeout(function() {
                        location.reload();
                    }, 2000);
                } else {
                    alert(' ' + data.message);
                    button.disabled = false;
                    button.textContent = '💳 Rembourser';
                }
            })
            .catch(function(error) {
                console.error('Erreur fetch:', error);
                alert(' Erreur lors du remboursement: ' + error.message);
                button.disabled = false;
                button.textContent = '💳 Rembourser';
            });
        }
        
        // Valider que le montant ne dépasse pas le reste
        document.addEventListener('DOMContentLoaded', function() {
            const inputs = document.querySelectorAll('.montant-remboursement');
            inputs.forEach(function(input) {
                input.addEventListener('input', function() {
                    const max = parseFloat(this.getAttribute('max'));
                    const value = parseFloat(this.value);
                    if (value > max) {
                        this.value = max;
                    }
                });
            });
        });
    </script>
</body>
</html>
