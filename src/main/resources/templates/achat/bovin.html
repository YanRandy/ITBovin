<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <h1>Formulaire Achat de bovin</h1>

    <!-- information du forunisseur -->
    <section class="info-fournisseur">
        <ul>
            <li th:text="${fournisseur.id}"></li>
            <li th:text="${fournisseur.nom}"></li>
            <li th:text="${fournisseur.contact}"></li>
            <li th:text="${fournisseur.adresse}"></li>
        </ul>
    </section>

    <!-- fomulaire d achat -->
    <section class="form-achat-bovin">
        <form action="/achat/bovin" method="post">
            <table border="1">
                <tr>
                    <th>Race</th>
                    <th>Poid Initial</th>
                    <th>Date de naissance</th>
                    <th>Date arrive</th>
                    <th>Prix achat</th>
                </tr>
                <tr>
                    <!-- selection du race -->
                    <td>
                        <select name="id_race">
                            <option th:each=" race : ${races}" th:value="${race.id}" th:text="${race.libelle}" >race 1</option>
                        </select>
                    </td>

                    <!-- input poid -->
                    <td>
                        <input type="number" name="poid">
                    </td>

                    <!-- input date naissance -->
                    <td>
                        <input type="date" name="date_naissance">
                    </td>

                    <!-- input date arrive -->
                    <td>
                        <input type="date" name="date_arrive">
                    </td>

                    <!-- input prix -->
                    <td>
                        <input type="number" name="prix_achat">
                    </td>
                </tr>
            </table>
            <button type="submit">Valider achat</button>
        </form>
    </section>

</body>

</html>
