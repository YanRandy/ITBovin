<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Liste des Races</title>
</head>
<body>
    <h1>Liste des Races</h1>
    <a href="/races/create">Créer une nouvelle race</a>
    <ul>
        <li th:each="race : ${races}" th:text="${race.libelle}"></li> 
        <button type="button" th:onclick="/races/edit/{id}(id=${race.id})">Modifier</button>
        <button type="button" th:onclick="/races/delete/{id}(id=${race.id})">Supprimer</button>

    </ul>
</body>
</html>
