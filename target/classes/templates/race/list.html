<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Liste des Races</title>
</head>
<body>
    <h1>Liste des Races</h1>
    <a href="/races/create">Créer une nouvelle race</a>
    <ul>
        <li th:each="race : ${races}">
            <span th:text="${race.libelle}"></span>
            <button type="button">Modifier</button>
            <form th:action="@{/races/delete/{id_race}(id_race=${race.id})}" method="post" style="display:inline;">
                <button type="submit">Supprimer</button>
            </form>
        </li>
    </ul>
</body>
</html>
