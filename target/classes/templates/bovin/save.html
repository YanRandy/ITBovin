<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <p>L'insertion de nouveau bovin sera dynamique via js</p>
    <p>Lot: <span id="idLot" th:text="${idLot}"></span> **ce truc change en fonction du lot selectionne depuis quelque part</p>
    <p>Race (en fonction de lot): <span id="idRace" th:text="${idRace}"></span> **inchangeable**</p>

    <form action="#" th:action="@{/bovin/save}" method="post">
        <label for="poidsInitial">Poids Initial:</label> **Poids actuel du bovin est poids initiale
        <input type="number" id="poidsInitial" required>
        <br>
        <label for="dateNaissance">Date de Naissance:</label>
        <input type="date" id="dateNaissance" required>
        <br>
        <label for="dateArrivee">Date d'Arrivee:</label>
        <input type="date" id="dateArrivee" required>
        <br>
        <label for="quantite">Quantite:</label>
        <input type="number" id="quantite" required>
        <br>
        <button type="submit">Ajouter</button>
    </form>

    <!-- Liste de ceux ajoutees -->
     <table>
        <thead>
            <tr>
                <th>Poids Initial</th>
                <th>Date de Naissance</th>
                <th>Date d'Arrivee</th>
                <th>Quantite</th>
            </tr>
        </thead>
        <tbody id="bovinTableBody">
            <!-- Les lignes seront ajoutées dynamiquement ici -->
        </tbody>
     </table>

     <input type="button" value="Enregistrer" onclick="save()">

    <script>
        // query c'est pour selectionner les balises ? -> oui
        document.querySelector('form').addEventListener('submit', function(event) {
            event.preventDefault(); // Empêche le formulaire de se soumettre normalement

            // Récupère les valeurs des champs du formulaire
            const poidsInitial = document.getElementById('poidsInitial').value;
            const dateNaissance = document.getElementById('dateNaissance').value;
            const dateArrivee = document.getElementById('dateArrivee').value;
            const quantite = document.getElementById('quantite').value;

            // Crée une nouvelle ligne dans le tableau
            const tableBody = document.getElementById('bovinTableBody');
            const newRow = document.createElement('tr');

            newRow.innerHTML = `
                <td>${poidsInitial}</td>
                <td>${dateNaissance}</td>
                <td>${dateArrivee}</td>
                <td>${quantite}</td>
                <td><button type="button" onclick="deleteRow(this)">Supprimer</button></td>
            `;

            tableBody.appendChild(newRow);

            // Réinitialise le formulaire
            this.reset();
        });

        function deleteRow(button) {
            const row = button.parentNode.parentNode;
            row.parentNode.removeChild(row);
        }

        function getAllLignes() {
            const lignes = [];
            const tableBody = document.getElementById('bovinTableBody');
            const rows = tableBody.querySelectorAll('tr');

            rows.forEach(row => {
                const cells = row.querySelectorAll('td');
                const ligneData = {
                    idLot: parseInt(document.getElementById('idLot').textContent),
                    idRace: parseInt(document.getElementById('idRace').textContent),
                    poidsInitial: parseFloat(cells[0].textContent),
                    poidsActuelle: parseFloat(cells[0].textContent),
                    dateNaissance: cells[1].textContent,
                    dateArrivee: cells[2].textContent,
                    quantite: parseInt(cells[3].textContent)
                };
                lignes.push(ligneData);
            });

            return lignes;
        }

        function save() {
            const lignes = getAllLignes();
            console.log(JSON.stringify(lignes));

            fetch('/bovin/lot/' + document.getElementById('idLot').textContent + '/save', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(lignes)
            }).then(response => {
                if (response.ok) {
                    alert('Bovins enregistrés avec succès !');
                } else {
                    alert('Erreur lors de l\'enregistrement des bovins.');
                }
            }).catch(error => {
                console.error('Erreur:', error);
                alert('Erreur lors de l\'enregistrement des bovins.');
            });
        }
    </script>
</body>
</html>
